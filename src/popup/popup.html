<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="search-container">
    <div id="search-wrapper">
      <svg id="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <input
        type="text"
        id="search-input"
        placeholder="Search tabs by title or URL..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>
    <span id="result-count"></span>
  </div>
  <div id="scroll-viewport">
    <div id="scroll-spacer"></div>
    <ul id="results-list"></ul>
  </div>
  <div id="empty-state" hidden>
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
      <circle cx="11" cy="11" r="8"/>
      <path d="M21 21l-4.35-4.35"/>
    </svg>
    <p>No matching tabs found</p>
  </div>
  <script src="../shared/defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
